<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ලිපි එකතු කරන්න - විද්‍යා චින්තන</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dynamic-island { position: relative; top: 0; transform: none; margin-bottom: 20px; }
        main { padding-top: 20px; }
    </style>
</head>
<body>
    <div class="dynamic-island" id="dynamicIsland">
        <div class="island-content">
            <div class="logo" id="logo">විද්‍යා චින්තන</div>
            <div class="nav-links">
                <a href="index.html">මුල් පිටුව</a>
                <a href="editor.html" style="color:var(--accent-primary);">ලිපි එකතු කරන්න</a>
                <a id="adminNavBtn" style="display:none;" href="admin.html">පරිපාලනය</a>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
                <img src="" class="user-avatar" id="userAvatar" style="display:none;">
            </div>
        </div>
    </div>

    <div class="container">
        <div class="form-container" style="max-width:800px;">
            <h2>📝 නව ලිපියක් එකතු කරන්න</h2>
            <div class="form-group"><label>ලිපියේ සිරස්තලය *</label><input type="text" id="articleTitle" placeholder="උදා: ක්වොන්ටම් පරිගණකකරණයේ අනාගතය"></div>
            <div class="form-group"><label>ප්‍රවර්ගය *</label><select id="articleCategory"><option>භෞතික විද්‍යාව</option><option>ජීව විද්‍යාව</option><option>රසායනය</option><option>තාක්ෂණය</option><option>තාරකා විද්‍යාව</option><option>පරිසරය</option></select></div>
            <div class="form-group"><label>ටැග් (කොමාවෙන් වෙන් කරන්න)</label><input type="text" id="articleTags" placeholder="උදා: ක්වොන්ටම්, පරිගණක"></div>
            <div class="form-group">
                <label>ප්‍රධාන පින්තූරය</label>
                <input type="text" id="articleImage" placeholder="URL එක ස්වයංක්‍රීයව එකතු වේ">
                <button type="button" id="uploadImageBtn" class="btn-outline" style="margin-top:8px;"><i class="fas fa-cloud-upload-alt"></i> පින්තූරයක් upload කරන්න</button>
            </div>
            <div class="form-group"><label>ලිපියේ අන්තර්ගතය (Markdown) *</label><textarea id="articleContent" rows="10" placeholder="# සිරස්තලය&#10;&#10;අන්තර්ගතය මෙතැනට..."></textarea></div>
            <div class="form-group"><label>කලාප අංකය</label><input type="text" id="articleIssue" placeholder="උදා: 2026-03"></div>
            <button class="btn-primary" id="submitArticleBtn" style="width:100%">ලිපිය එකතු කරන්න</button>
            <div id="articleSubmitMsg" style="margin-top:12px; text-align:center;"></div>
        </div>
    </div>

    <footer class="footer"><div class="container"><p>&copy; <span id="currentYear"></span> විද්‍යා චින්තන - සියලුම හිමිකම් ඇවිරිණි</p></div></footer>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
